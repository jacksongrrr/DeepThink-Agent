<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DeepThink Agent — 思考路径 + R1 对比</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <header class="hero">
      <h1>DeepThink Agent</h1>
      <p class="lead">
        技术侧先经<strong>问题分类 Chat</strong> 再生成<strong>元认知型思考路径</strong>，多路径
        <strong>并行 R1</strong> 后由 Chat 综合。默认界面<strong>只展开最终回答与各路径小结</strong>；分类画像、路径规划与
        R1 推理过程需<strong>点击展开</strong>。对比模式下与单次 R1 流式并行。
      </p>
    </header>

    <main class="panel">
      <section class="controls">
        <label class="field">
          <span>运行模式</span>
          <select id="mode">
            <option value="compare">对比：纯 R1 vs 多路径×R1+综合</option>
            <option value="tech_only">仅技术：多路径×R1 + Chat 综合</option>
            <option value="baseline_only">仅基线：纯 R1</option>
          </select>
        </label>
        <label class="field grow">
          <span>你的问题</span>
          <textarea
            id="question"
            rows="4"
            placeholder="例如：怎么赚钱？"
          ></textarea>
        </label>
        <div class="actions">
          <button type="button" id="run" class="primary">运行</button>
          <span id="status" class="status" aria-live="polite"></span>
        </div>
      </section>

      <section id="output" class="output hidden"></section>
    </main>

    <footer class="footer">
      <p>密钥仅保存在本机 <code>.env</code>，不会上传至本仓库。调用直连 DeepSeek API。</p>
    </footer>

    <!-- 使用官方 UMD 构建并随仓库分发，避免仅依赖 CDN 时脚本被墙/拦截导致无法渲染、仍显示原始 # ** 等符号 -->
    <script src="/assets/vendor/marked.umd.js" defer></script>
    <script src="/assets/vendor/purify.min.js" defer></script>
    <script src="/assets/app.js" defer></script>
  </body>
</html>
